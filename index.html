<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для Дашеньки ❤️</title>
    <style>
        body {
            background-color: #0a0a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Чтобы салют не создавал прокрутку */
        }

        /* Холст для салюта на весь экран */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2; /* Поверх салюта */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        h1 {
            font-size: 1.4rem;
            color: #ff4d6d;
            text-align: center;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 40px;
            text-align: center;
        }

        .gift-container {
            position: relative;
            width: 320px; 
            height: 200px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .white-square {
            width: 140px;
            height: 140px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .white-square::after {
            content: "ПЕРЕД";
            color: #333;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .usb-line {
            position: absolute;
            left: 145px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            width: 175px;
        }

        .btn-text-block {
            position: absolute;
            left: 145px;
            bottom: 10px;
            width: 175px;
        }

        .arrow {
            color: #00d4ff;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 5px;
        }

        .text {
            font-size: 0.8rem;
            line-height: 1.2;
        }

        .highlight {
            color: #ff4d6d;
            font-weight: bold;
        }

        .kit-info {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding: 20px 0;
        }

        .heart {
            display: inline-block;
            color: #ff4d6d;
            font-size: 2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <h1>С Новым 2026 Годом, моя любимая Дашенька! 🎄</h1>
        <div class="subtitle">Это небольшая инструкция как пользоваться твоим подарком))</div>

        <div class="gift-container">
            <div class="white-square"></div>

            <div class="usb-line">
                <span class="arrow">←</span>
                <div class="text">
                    <b>тут разъем type c</b><br>
                    просто подключи кабель и чуть-чуть подожди
                </div>
            </div>

            <div class="btn-text-block">
                <div class="text">
                    <span class="highlight">нажми на кнопочку с права чтоб поменять режим</span>
                </div>
            </div>
        </div>

        <div class="kit-info">
            🔌 Кабель и блочок уже в комплекте!
        </div>

        <div class="footer">
            <span class="heart">❤️</span>
            <p style="font-size: 1.2rem; margin: 5px 0;">Я люблю тебя!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        let particles = [];

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.5);
            const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
            
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });
        }

        // Запуск салютов
        setInterval(createFirework, 800);
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
